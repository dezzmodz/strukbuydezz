  margin: 0;

body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);

}

/* CARD */
.container{
  width: 100%;
  max-width: 850px;
  margin: auto;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* TITLE */
h2{
  text-align: center;
  color: #22c55e;
  margin-bottom: 15px;
}

/* TEXTAREA */
textarea{
  width: 100%;
  min-height: 250px;
  height: 50vh;
  max-height: 70vh;

  padding: 12px;
  border-radius: 12px;
  border: none;

  background: rgba(0,0,0,0.6);
  color: #e2e8f0;

  outline: none;
  resize: none;
}

textarea:focus{
  box-shadow: 0 0 0 2px #22c55e;
}

/* INFO */
.info{
  margin-top: 8px;
  font-size: 13px;
  color: #94a3b8;
}

/* BUTTON GROUP */
.buttons{
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 15px;
}

/* BUTTON */
button{
  flex: 1 1 30%;
  min-width: 90px;

  padding: 10px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.2);

  cursor: pointer;
  font-weight: bold;

  position: relative;
  overflow: hidden;

  transition: transform 0.1s ease, box-shadow 0.2s;
}

/* tekan */
button:active{
  transform: scale(0.95);
}

/* ripple */
button .ripple{
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple 0.5s linear;
  background: rgba(255,255,255,0.4);
  pointer-events: none;
}

@keyframes ripple{
  to{
    transform: scale(4);
    opacity: 0;
  }
}

button:hover{
  box-shadow: 0 0 10px rgba(255,255,255,0.15);
}

/* COLORS */
.copy{
  background: linear-gradient(45deg,#22c55e,#4ade80);
  color: #022c22;
  border-color: #22c55e;
}

.clear{
  background: linear-gradient(45deg,#ef4444,#f87171);
  color: white;
  border-color: #ef4444;
}

.reset{
  background: linear-gradient(45deg,#facc15,#fde047);
  color: #3f2f00;
  border-color: #facc15;
}

/* CHECKBOX */
.checkbox{
  margin-top: 12px;
  display: flex;
  gap: 8px;
}

/* STATUS */
.status{
  margin-top: 10px;
  font-size: 13px;
  color: #38bdf8;
}

/* MOBILE */
@media (max-width:600px){
  h2{font-size:18px;}
  textarea{height:45vh;font-size:13px;}
  button{font-size:12px;padding:8px;}
}
</style>
</head>

<script>

function cleanText(text){

  const urlRegex = /([^\s]*https?:\/\/[^\s]+)/g;

  let parts = text.split(urlRegex);
  let result = "";

  for(let i=0;i<parts.length;i++){

    // 🔥 pakai test biar aman
    if(urlRegex.test(parts[i])){

      let cleanURL = parts[i]
        .replace(/.*?(https?:\/\/)/, "$1")
        .replace(/[\u{1F000}-\u{1FFFF}]/gu, "")
        .replace(/[+\-_*~`]+$/g, "");

      result += cleanURL;

    } else {

      // teks biasa tetap masuk
      result += parts[i].replace(/[+\*>'`_~#]/g,"");

  }

  } // ✅ INI YANG KURANG TADI

  return result;
}

/* ===== COUNT TEXT ===== */
const textarea = document.getElementById("textInput");
const counter = document.getElementById("counter");

textarea.addEventListener("input", updateCounter);

function updateCounter(){

let text = textarea.value;
let chars = text.length;
let lines = text.split("\n").length;

counter.innerText = "Karakter: " + chars + " | Baris: " + lines;

}

function getTangal(){
  let d = new Date();

  let tahun = d.getFullYear();
  let bulan = String(d.getMonth()+1).padStart(2,'0');
  let tanggal = String(d.getDate()).padStart(2,'0');
  let jam = String(d.getHours()).padStart(2,'0');
  let menit = String(d.getMinutes()).padStart(2,'0');
  let detik = String(d.getSeconds()).padStart(2,'0');

  return `📅 Date: ${tahun}-${bulan}-${tanggal} ⏰ ${jam}:${menit}:${detik}`;
}


let counterUpdate = parseInt(localStorage.getItem("counter")) || 0;

function Now131(){
  counterUpdate++;
  localStorage.setItem("counter", counterUpdate);

  let d = new Date();

  let tahun = d.getFullYear();
  let bulan = String(d.getMonth()+1).padStart(2,'0');
  let tanggal = String(d.getDate()).padStart(2,'0');
  let jam = String(d.getHours()).padStart(2,'0');
  let menit = String(d.getMinutes()).padStart(2,'0');

  return `#${counterUpdate} NEW UPDATE: ${jam}:${menit} 📅 ${tanggal}/${bulan}/${tahun}`;
}

function resetCounter(){
  if(confirm("Yakin mau reset counter?")){
    counterUpdate = 0;
    localStorage.setItem("counter", 0);
    document.getElementById("status").innerText = "Counter direset!";
  }
}

document.querySelectorAll("button").forEach(btn => {
  btn.addEventListener("click", function(e){

    const circle = document.createElement("span");
    const diameter = Math.max(this.clientWidth, this.clientHeight);
    const radius = diameter / 2;

    circle.style.width = circle.style.height = diameter + "px";
    circle.style.left = e.clientX - this.offsetLeft - radius + "px";
    circle.style.top = e.clientY - this.offsetTop - radius + "px";

    circle.classList.add("ripple");

    const ripple = this.getElementsByClassName("ripple")[0];
    if(ripple) ripple.remove();

    this.appendChild(circle);
  });
});
</script>
