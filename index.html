<script>

function cleanText(text){

  const urlRegex = /([^\s]*https?:\/\/[^\s]+)/g;

  let parts = text.split(urlRegex);
  let result = "";

  for(let i=0;i<parts.length;i++){

    // 🔥 pakai test biar aman
    if(urlRegex.test(parts[i])){

      let cleanURL = parts[i]
        .replace(/.*?(https?:\/\/)/, "$1")
        .replace(/[\u{1F000}-\u{1FFFF}]/gu, "")
        .replace(/[+\-_*~`]+$/g, "");

      result += cleanURL;

    } else {

      // teks biasa tetap masuk
      result += parts[i].replace(/[+\*>'`_~#]/g,"");

  }

  } // ✅ INI YANG KURANG TADI

  return result;
}

function getDateNow(){

  let tanggal = String(d.getDate()).padStart(2,'0');

  let detik = String(d.getSeconds()).padStart(2,'0');

}
